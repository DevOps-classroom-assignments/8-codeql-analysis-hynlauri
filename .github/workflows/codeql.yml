name: CodeQL + Docker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        language: [ go ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Hakee koodin runnerille

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        # Ajaa analyysin, löytää mahdolliset haavoittuvuudet

  docker:
    name: Docker Build & Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t go-web-server .

      - name: Run container
        run: docker run -d -p 8080:8080 --name go-web-server go-web-server

      - name: Test /readfile
        run: |
          sleep 5
          curl --fail "http://localhost:8080/readfile?file=hello.txt"

      - name: Cleanup
        if: always()
        run: docker rm -f go-web-server